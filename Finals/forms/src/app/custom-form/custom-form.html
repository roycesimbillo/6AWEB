<!-- Navigation Buttons -->
<div class="nav-buttons">
  <button type="button" [class.active-nav]="isActive('template')" (click)="navigate('template')">Template Form</button>
  <button type="button" [class.active-nav]="isActive('reactive')" (click)="navigate('reactive')">Reactive Form</button>
  <button type="button" [class.active-nav]="isActive('custom')" (click)="navigate('custom')">Custom Form</button>
</div>

<form (ngSubmit)="onSubmit()" #form="ngForm" class="creative-form">
  <div>
    <label for="bookTitle">Book Title:</label>
    <input type="text" id="bookTitle" [(ngModel)]="bookTitle" name="bookTitle" required minlength="2">
  </div>
  <div>
    <label for="author">Author:</label>
    <input type="text" id="author" [(ngModel)]="author" name="author" required>
  </div>
  <div>
    <label for="genre">Genre:</label>
    <select id="genre" [(ngModel)]="genre" name="genre" required>
      <option value="">Select genre</option>
      <option value="fiction">Fiction</option>
      <option value="nonfiction">Non-fiction</option>
      <option value="fantasy">Fantasy</option>
      <option value="biography">Biography</option>
      <option value="other">Other</option>
    </select>
  </div>
  <div>
    <label for="published">Published Year:</label>
    <input type="number" id="published" [(ngModel)]="published" name="published" required min="1900" max="2026">
  </div>
  <div>
    <label for="rating">Rating:</label>
    <input type="range" id="rating" [(ngModel)]="rating" name="rating" min="1" max="5" required>
    <span>{{ rating }}</span>
  </div>
  <div>
    <label for="review">Review:</label>
    <textarea id="review" [(ngModel)]="review" name="review" rows="3" required></textarea>
  </div>
  <button type="submit" [disabled]="!form.valid" [class.filled]="form.valid">Submit</button>
</form>
<div *ngIf="submitted" class="submitted-data">
  <h3>Book Review Submitted!</h3>
  <p><strong>Title:</strong> {{ bookTitle }}</p>
  <p><strong>Author:</strong> {{ author }}</p>
  <p><strong>Genre:</strong> {{ genre }}</p>
  <p><strong>Published:</strong> {{ published }}</p>
  <p><strong>Rating:</strong> {{ rating }}</p>
  <p><strong>Review:</strong> {{ review }}</p>
</div>
