<!-- Navigation Buttons -->
<div class="nav-buttons">
  <button type="button" [class.active-nav]="isActive('template')" (click)="navigate('template')">Template Form</button>
  <button type="button" [class.active-nav]="isActive('reactive')" (click)="navigate('reactive')">Reactive Form</button>
  <button type="button" [class.active-nav]="isActive('custom')" (click)="navigate('custom')">Custom Form</button>
</div>

<form (ngSubmit)="onSubmit()" #form="ngForm" class="creative-form">
  <div>
    <label for="username">Username:</label>
    <input type="text" id="username" [(ngModel)]="username" name="username" required>
  </div>
  <div>
    <label for="email">Email:</label>
    <input type="email" id="email" [(ngModel)]="email" name="email" required>
  </div>
  <div>
    <label for="password">Password:</label>
    <input type="password" id="password" [(ngModel)]="password" name="password" required>
  </div>
  <div>
    <label for="role">Role:</label>
    <select id="role" [(ngModel)]="role" name="role" required>
      <option value="">Select a role</option>
      <option value="admin">Admin</option>
      <option value="user">User</option>
    </select>
  </div>
  <button type="submit" [disabled]="!form.valid" [class.filled]="form.valid">Submit</button>
</form>
<div *ngIf="submitted">
  <h3>Form Submitted!</h3>
  <p>Username: {{ username }}</p>
  <p>Email: {{ email }}</p>
  <p>Password: {{ password }}</p>
  <p>Role: {{ role }}</p>
</div>
